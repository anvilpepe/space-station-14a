- type: entity
  parent: MobHumanSpecialReAgent
  id: MobHumanDeathsquadJuggernaut
  name: джаггернаут Эскадрона смерти
  description: В своём скафандре ты неуязвим, а если снять, кто ты без него?
  components:
  - type: GhostRole
    allowMovement: true
    allowSpeech: true
    makeSentient: true
    name: Джаггернаут спец войск
    description: Элитный солдат отряда Omega - 0, напичканые импланты и курсы космического спецназа сделали из него бесчувственную машину. Один из немногих, кто был удостоен носить снаряжение джаггернаута спецсил.
    rules: Выполняйте различные приказы, ваша задача будет варьироваться от задач центрального командования. Не снимайте скафандр!
    raffle:
      settings: default
    requirements:
      - !type:DepartmentTimeRequirement
        department: Security
        time: 18000
      - !type:OverallPlaytimeRequirement
        time: 36000
  - type: Loadout
    prototypes: [SpecialForceJuggernautGearFull]
